# 当前使用的策略名称
# 可选: martingale (马丁格尔), institutional_trend (终极趋势)
strategy_name: "institutional_trend"

# 基础账户配置
account:
  initial_capital: 100000.0 #10w
  commission_rate: 0.0003  # 手续费万三
  max_positions: 3         # 最大同时持仓数

# 多股票组合配置
multi_stock:
  enable: true             # 是否启用多股票模式
#  stocks:                  # 股票池列表 [(代码, 名称), ...]
#    - code: "600036"
#      name: "招商银行"
#    - code: "000001"
#      name: "平安银行"
#    - code: "601318"
#      name: "中国平安"

# 马丁格尔策略参数
martingale:
  first_amount: 10000.0    # 第一笔买入金额
  base_drop: 0.03          # 基础跌幅 (3%)
  step_factor: 1.1         # 跌幅步进 (每层跌幅增加倍数)
  growth_factor: 1.5       # 资金倍增 (每层投入增加倍数)
  max_steps: 5             # 最大补仓层数
  take_profit_pct: 0.08    # 止盈目标 (8%)
  stop_loss_pct: 0.15      # 全仓止损 (15%)

# 终极趋势策略参数 v6.1 (专业优化版)
institutional_trend:
  stop_loss_pct: 0.10          # 硬止损 (10%)
  trailing_stop_pct: 0.20      # 默认移动止盈 (20%)
  unit_size: 0.1               # 单次建仓比例 (10%)
  max_units: 4                 # 最大加仓次数 (总仓位 40%)
  
  # 分档动态止盈参数
  profit_tier1: 0.30           # 第一档: 利润达到 30%
  trailing_tier1: 0.15         # 对应止盈收紧至 15%
  profit_tier2: 0.50           # 第二档: 利润达到 50%
  trailing_tier2: 0.10         # 对应止盈收紧至 10%
  
  # 分批出场参数
  partial_exit_pct: 0.5        # 分批卖出比例 (50%)
  enable_partial_exit: true    # 是否启用分批出场

# 策略默认参数 (向后兼容)
strategy:
  first_amount: 10000.0
  base_drop: 0.03
  step_factor: 1.1
  growth_factor: 1.5
  max_steps: 5
  take_profit_pct: 0.08
  stop_loss_pct: 0.10
  trailing_stop_pct: 0.20
  unit_size: 0.1
  max_units: 4
  profit_tier1: 0.30
  trailing_tier1: 0.15
  profit_tier2: 0.50
  trailing_tier2: 0.10
  partial_exit_pct: 0.5
  enable_partial_exit: false

# 启动与退出机制
mechanism:
  entry_type: "immediate"   # 启动方式: immediate(立即启动), signal(待信号)
  exit_after_cycles: 0      # 运行多少个获利周期后停止回测 (0为运行到底)
  re_entry_delay: 1         # 获利出场后，等待多少个交易日再次进场
